<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Wheelie Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      height: 100%;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      display: block;
      border: 2px solid #e94560;
      border-radius: 6px;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.4), 0 0 80px rgba(0, 180, 216, 0.15);
    }
    #btn-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      pointer-events: none;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .game-btn {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      font-family: 'Courier New', monospace;
      pointer-events: all;
      transition: transform 0.08s, opacity 0.08s;
      opacity: 0.88;
      flex-shrink: 0;
    }
    .game-btn:active { transform: scale(0.92); opacity: 1; }
    #btn-pop { background: rgba(233, 69, 96, 0.85); }
    #btn-hop { background: rgba(0, 180, 216, 0.85); }
  </style>
</head>
<body>
<div id="wrapper">
  <canvas id="c"></canvas>
  <div id="btn-row">
    <div class="game-btn" id="btn-pop">POP!</div>
    <div class="game-btn" id="btn-hop">HOP!</div>
  </div>
</div>

<script>
// ─── Canvas Setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const BASE_W = 900;
const BASE_H = 500;
canvas.width = BASE_W;
canvas.height = BASE_H;

// Scale canvas for retina / viewport — always centered, no cropping
function resize() {
  const vw   = window.innerWidth;
  const vh   = window.innerHeight;

  // Reserve height for the button row below the game
  const btnRowH = 148;
  const availW  = vw;
  const availH  = vh - btnRowH;

  // Fit canvas within available space while preserving aspect ratio
  const scale   = Math.min(availW / BASE_W, availH / BASE_H);
  const canvasW = Math.round(BASE_W * scale);
  const canvasH = Math.round(BASE_H * scale);

  canvas.style.width  = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  canvas.style.marginLeft = '';

  // Match button row width to canvas so POP/HOP stay at canvas edges
  document.getElementById('btn-row').style.width = canvasW + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Constants ───────────────────────────────────────────────────────────────
const GROUND_Y   = BASE_H - 90;
const WHEEL_R    = 16;
const BIKE_LEN   = 60;

// Physics
// angle < 0 = front wheel UP (wheelie)
// angle = 0 = both wheels down (normal riding — default equilibrium)
// angle > 0 = nose down (crash direction)
const LEAN_BACK     = 0.009;  // force applied when holding wheelie key (drives angle negative)
const SPRING_K      = 0.022;  // spring constant — restores angle to 0 when released
const ANG_DAMP      = 0.88;   // angular damping
const CRASH_WHEELIE = -1.55;  // angle too negative = fell back off the bike
const FLOAT_FRAMES  = 28;     // frames of reduced gravity at peak after double-jump
const FLOAT_GRAVITY = 0.04;   // gravity during float window (vs normal 0.55)

// ─── Jump / physics constants (match jump-test.html sandbox) ─────────────────
const GRAVITY          = 0.55;   // pixels per frame² pulled toward ground
const JUMP_VEL         = -12;    // manual jump launch velocity
const SUPER_VEL        = -20;    // double-tap from ground
const MID_AIR_VEL      = -18;    // mid-air boost (second tap while airborne)
const RAMP_VEL         = -13;    // auto-launch off a ramp obstacle
const BOUNCE_VEL       = -9;     // hood-bounce rebound off cop car roof
const COPCAR_CLEAR     = -55;    // jumpY must be below this (more negative) to clear cop car
const BOUNCE_MIN_VEL   = 2;      // descending speed needed to trigger hood bounce (not crash)
const BOUNCE_MIN_Y     = -25;    // must be this high above ground for hood bounce to register

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
let popHeld         = false;  // wheelie button currently held
let popTapped       = false;  // true for ONE frame when pop is freshly pressed
let popHoldFrames   = 0;      // consecutive frames pop has been held (for loop-out)
let hopTapped       = false;  // single jump (consumed each frame)
let superHopPending = false;  // double-tap super jump (consumed each frame)
let lastHopTime     = 0;      // timestamp of last hop input for double-tap detection

// Call this for every HOP input — detects double-tap within 300ms
function registerHop() {
  if (gameState !== 'playing') { startGame(); return; }
  const now = Date.now();
  if (now - lastHopTime < 300) {
    superHopPending = true;  // second tap close enough → super jump
    hopTapped = false;
  } else {
    hopTapped = true;
  }
  lastHopTime = now;
}

document.addEventListener('keydown', e => {
  if (keys[e.code]) return; // ignore repeat
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowRight'].includes(e.code)) e.preventDefault();
  if ((e.code === 'Space' || e.code === 'Enter') && gameState !== 'playing') { startGame(); return; }
  if (e.code === 'ArrowUp'    && gameState === 'playing') registerHop();
  if (e.code === 'ArrowRight' && gameState === 'playing') popTapped = true;
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// POP button — tap to wheelie (each press = impulse; hold too long = loop out and crash)
const btnPop = document.getElementById('btn-pop');
btnPop.addEventListener('touchstart', e => { popHeld = true; popTapped = true; e.preventDefault(); }, { passive: false });
btnPop.addEventListener('touchend',   e => { popHeld = false; e.preventDefault(); }, { passive: false });
btnPop.addEventListener('touchcancel',e => { popHeld = false; });
btnPop.addEventListener('mousedown',  e => { popHeld = true; popTapped = true; e.preventDefault(); });
btnPop.addEventListener('mouseup',    e => { popHeld = false; });
btnPop.addEventListener('mouseleave', e => { popHeld = false; });

// HOP button — tap to jump (double-tap = super jump)
const btnHop = document.getElementById('btn-hop');
btnHop.addEventListener('touchstart', e => { registerHop(); e.preventDefault(); }, { passive: false });
btnHop.addEventListener('touchend',   e => { e.preventDefault(); }, { passive: false });
btnHop.addEventListener('mousedown',  e => { registerHop(); e.preventDefault(); });

// Tap canvas to navigate menus
canvas.addEventListener('click', handleCanvasClick);
canvas.addEventListener('touchstart', e => {
  const r = canvas.getBoundingClientRect();
  const scaleX = BASE_W / r.width;
  const scaleY = BASE_H / r.height;
  const t = e.touches[0];
  handleCanvasClick({ clientX: t.clientX, clientY: t.clientY, _rect: r, _sx: scaleX, _sy: scaleY });
  e.preventDefault();
}, { passive: false });

function isWheelieHeld() {
  // → arrow or POP button = wheelie
  return keys['ArrowRight'] || popHeld;
}

// ─── Game State ───────────────────────────────────────────────────────────────
let gameState  = 'menu'; // menu | playing | dead | gameover
let score      = 0;
let distance   = 0;
let highScore  = 0;
let gameTime   = 0;
let speed      = 5;
let scrollX    = 0;
let jumpsMade  = 0;  // counts successful pothole/copcar clears — drives phase progression

// ─── Player ───────────────────────────────────────────────────────────────────
const player = {
  x: 160,
  y: GROUND_Y,
  angle: 0,
  angVel: 0,
  wheelieTime: 0,
  jumpY: 0,
  jumpVel: 0,
  onGround: true,
  alive: true,
  deathTimer: 0,
};

// ─── Scene objects ────────────────────────────────────────────────────────────
let obstacles    = [];
let collectibles = [];
let particles    = [];
let clouds       = [];
let nextHeliDist = 2200; // helicopter spawns independently of ground obstacles
let bgDecor      = [];
let groundSegs   = []; // decorative ground stripe offsets

let nextObsDist    = 500;
let nextCoinDist   = 250;
let copCarCooldown = 0;  // pixel distance remaining before another cop car is allowed

// ─── Wheel spin accumulator ───────────────────────────────────────────────────
let wheelSpin = 0;

// ─── Assets ───────────────────────────────────────────────────────────────────
const bgImg     = new Image();
bgImg.src       = 'background.png';
const spriteImg = new Image();
spriteImg.src   = 'surron-sprite.png';
const copCarImg   = new Image();
copCarImg.src     = 'cop-car.png';
let   copCarClean = null; // white-bg-removed version, built on load

function stripWhiteBg(img) {
  const tmp = document.createElement('canvas');
  tmp.width  = img.naturalWidth;
  tmp.height = img.naturalHeight;
  const tc   = tmp.getContext('2d');
  tc.drawImage(img, 0, 0);
  const id = tc.getImageData(0, 0, tmp.width, tmp.height);
  const d  = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const minC = Math.min(d[i], d[i+1], d[i+2]);
    if (minC > 220) d[i+3] = Math.round(Math.max(0, (255 - minC) / 35) * 255);
  }
  tc.putImageData(id, 0, 0);
  return tmp;
}

copCarImg.onload = () => { copCarClean = stripWhiteBg(copCarImg); };

const heliImg   = new Image();
heliImg.src     = 'helicopter.png';
let   heliClean = null;
heliImg.onload  = () => { heliClean = stripWhiteBg(heliImg); };

// ─── Initialize scene ─────────────────────────────────────────────────────────
function initScene() {
  clouds  = [];
  bgDecor = [];
  // clouds kept for update loop compatibility; background image handles all bg rendering
}

function newCloud(x) {
  return {
    x,
    y: 30 + Math.random() * 140,
    rx: 55 + Math.random() * 70,
    ry: 22 + Math.random() * 22,
    spd: 0.25 + Math.random() * 0.4,
  };
}

function newDecor(x) {
  const t = Math.random();
  return {
    x,
    y: GROUND_Y,
    type: t < 0.5 ? 'bush' : 'stone',
    size: 14 + Math.random() * 20,
    colorV: Math.random(),
  };
}

// ─── Phase / difficulty progression ──────────────────────────────────────────
// Phase advances every time the player successfully clears a pothole or cop car.
// Phase 1 (0–5 clears)  : potholes + cones only, wide gaps
// Phase 2 (6–14 clears) : cop cars introduced rarely (~10%)
// Phase 3 (15–24 clears): cop cars more frequent (~25%), tighter gaps
// Phase 4 (25+ clears)  : full difficulty, max cop car frequency (~40%)
function getGamePhase() {
  if (jumpsMade < 6)  return 1;
  if (jumpsMade < 15) return 2;
  if (jumpsMade < 25) return 3;
  return 4;
}

// ─── Obstacle spawning ────────────────────────────────────────────────────────
// Minimum pixel gap between any two cop car spawns (car is 480px wide + ramp,
// so this ensures the player has a clear runway to land and recover before the next one).
const COPCAR_MIN_GAP = 1400;

function spawnCopCar(x) {
  obstacles.push({ type: 'ramp',   x: x - 110, y: GROUND_Y, w: 80, h: 55, passed: false });
  obstacles.push({ type: 'copcar', x, y: GROUND_Y - 240, w: 480, h: 240, passed: false, lightTimer: 0 });
  copCarCooldown = COPCAR_MIN_GAP;
}

function spawnObstacle() {
  const roll  = Math.random();
  const phase = getGamePhase();
  const x     = BASE_W + 80;
  // If cooldown is active, downgrade any cop-car roll to a cone
  const canSpawnCopCar = copCarCooldown <= 0;

  if (phase === 1) {
    // Potholes and cones only — player learns to jump
    if (roll < 0.55) {
      obstacles.push({ type: 'pothole', x, y: GROUND_Y, w: 48 + Math.random() * 20, h: 18, passed: false });
    } else {
      obstacles.push({ type: 'cone', x, y: GROUND_Y, w: 18, h: 40, passed: false });
    }
  } else if (phase === 2) {
    // Cop cars appear rarely (~10%)
    if (roll < 0.45) {
      obstacles.push({ type: 'pothole', x, y: GROUND_Y, w: 48 + Math.random() * 22, h: 18, passed: false });
    } else if (roll < 0.90 || !canSpawnCopCar) {
      obstacles.push({ type: 'cone', x, y: GROUND_Y, w: 18, h: 40, passed: false });
    } else {
      spawnCopCar(x);
    }
  } else if (phase === 3) {
    // Cop cars more frequent (~25%)
    if (roll < 0.38) {
      obstacles.push({ type: 'pothole', x, y: GROUND_Y, w: 48 + Math.random() * 24, h: 18, passed: false });
    } else if (roll < 0.75 || !canSpawnCopCar) {
      obstacles.push({ type: 'cone', x, y: GROUND_Y, w: 18, h: 40, passed: false });
    } else {
      spawnCopCar(x);
    }
  } else {
    // Phase 4 — full chaos (~40% cop cars)
    if (roll < 0.30) {
      obstacles.push({ type: 'pothole', x, y: GROUND_Y, w: 48 + Math.random() * 24, h: 18, passed: false });
    } else if (roll < 0.60 || !canSpawnCopCar) {
      obstacles.push({ type: 'cone', x, y: GROUND_Y, w: 18, h: 40, passed: false });
    } else {
      spawnCopCar(x);
    }
  }
}

function spawnCoin() {
  const x = BASE_W + 40;
  const y = GROUND_Y - 44 - Math.random() * 70;
  collectibles.push({ x, y, r: 10, spin: Math.random() * Math.PI * 2, taken: false });
}

function spawnHelicopter() {
  // Helicopter draws from the image; drawH is the rendered height.
  // Collision uses only the fuselage body (left ~62% wide, middle ~68% tall after skipping rotor).
  const drawH = 110;
  const aspect = heliImg.naturalWidth && heliImg.naturalHeight
    ? heliImg.naturalWidth / heliImg.naturalHeight : 3.3;
  const drawW = Math.round(drawH * aspect);
  obstacles.push({
    type: 'helicopter',
    x: BASE_W + 60,
    drawY: GROUND_Y - 218,  // top of image; body center ends up ~GROUND_Y-160
    w: drawW,
    h: drawH,
    passed: false,
  });
}

// ─── Particles ────────────────────────────────────────────────────────────────
function burst(x, y, color, n = 10, str = 1) {
  for (let i = 0; i < n; i++) {
    const a  = Math.random() * Math.PI * 2;
    const sp = (2 + Math.random() * 4) * str;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 2,
      life: 1,
      decay: 0.025 + Math.random() * 0.03,
      r: 3 + Math.random() * 4,
      color,
    });
  }
}

function tireSmoke(rx, ry) {
  particles.push({
    x: rx + (Math.random() - 0.5) * 6,
    y: ry,
    vx: -speed * 0.4 - Math.random() * 1.5,
    vy: -Math.random() * 2.5,
    life: 1,
    decay: 0.045 + Math.random() * 0.04,
    r: 5 + Math.random() * 6,
    color: `hsl(${30 + Math.random() * 50}, 100%, ${60 + Math.random() * 20}%)`,
  });
}

// ─── Round rect helper (cross-browser) ───────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

// ─── Drawing ──────────────────────────────────────────────────────────────────

// Draws background.png as a scrolling parallax image, then overlays the dark road strip.
function drawBackground() {
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    const scale = BASE_H / bgImg.naturalHeight;
    const rw    = bgImg.naturalWidth * scale; // rendered width at canvas height
    const off   = (scrollX * 0.12) % rw;
    // Draw two copies for seamless horizontal loop
    ctx.drawImage(bgImg, -off,      0, rw, BASE_H);
    ctx.drawImage(bgImg, rw - off,  0, rw, BASE_H);
    // If canvas is wider than two copies, draw a third
    if (rw * 2 < BASE_W + off) ctx.drawImage(bgImg, rw * 2 - off, 0, rw, BASE_H);
  } else {
    // Fallback warm sky while image loads
    const g = ctx.createLinearGradient(0, 0, 0, BASE_H);
    g.addColorStop(0,   '#2d1b5e');
    g.addColorStop(0.4, '#9b2335');
    g.addColorStop(0.7, '#e8522a');
    g.addColorStop(1,   '#3d1a5e');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, BASE_W, BASE_H);
  }

  // Dark road overlay at bottom — also helps the sprite's gray bg blend in
  const roadGrad = ctx.createLinearGradient(0, GROUND_Y - 30, 0, BASE_H);
  roadGrad.addColorStop(0,   'rgba(8, 4, 18, 0)');
  roadGrad.addColorStop(0.35,'rgba(8, 4, 18, 0.82)');
  roadGrad.addColorStop(1,   'rgba(4, 0, 10, 0.97)');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(0, GROUND_Y - 30, BASE_W, BASE_H - GROUND_Y + 30);

  // Ground surface line
  ctx.fillStyle = '#5a3878';
  ctx.fillRect(0, GROUND_Y, BASE_W, 3);

  // Road dashes
  const dashOff = scrollX % 80;
  ctx.fillStyle = 'rgba(255, 200, 80, 0.22)';
  for (let x = -dashOff; x < BASE_W; x += 80) {
    ctx.fillRect(x, GROUND_Y + 6, 42, 3);
  }
}

function drawObstacles() {
  obstacles.forEach(obs => {
    if (obs.type === 'pothole')          drawPothole(obs);
    else if (obs.type === 'cone')        drawCone(obs);
    else if (obs.type === 'ramp')        drawRamp(obs);
    else if (obs.type === 'copcar')      drawCopCar(obs);
    else if (obs.type === 'helicopter')  drawHelicopter(obs);
  });
}

function drawHelicopter(obs) {
  const src = heliClean || (heliImg.complete && heliImg.naturalWidth > 0 ? heliImg : null);
  if (!src) return;
  ctx.drawImage(src, obs.x, obs.drawY, obs.w, obs.h);
}

function drawPothole(obs) {
  const cx = obs.x + obs.w / 2;

  // Crack lines radiating from pit
  ctx.strokeStyle = '#3a2050';
  ctx.lineWidth = 1.5;
  [[cx-4, GROUND_Y-4, cx-16, GROUND_Y-22],
   [cx+7, GROUND_Y-3, cx+20, GROUND_Y-17],
   [cx+1, GROUND_Y-5, cx-6,  GROUND_Y-30]].forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });

  // Dark pit
  ctx.fillStyle = '#030008';
  ctx.beginPath();
  ctx.ellipse(cx, GROUND_Y, obs.w / 2, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Rim highlight
  ctx.strokeStyle = '#6030a0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, GROUND_Y - 2, obs.w / 2 - 2, 12, 0, Math.PI * 1.1, Math.PI * 1.9);
  ctx.stroke();

  // Pit depth gradient
  const g = ctx.createRadialGradient(cx - 5, GROUND_Y - 4, 0, cx, GROUND_Y, obs.w / 2);
  g.addColorStop(0, 'rgba(100,0,180,0.3)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(cx, GROUND_Y, obs.w / 2, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Warning label
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('⚠ JUMP!', cx, GROUND_Y - 24);
  ctx.textAlign = 'left';
}

function drawCone(obs) {
  const cx  = obs.x + obs.w / 2;
  const top = obs.y - obs.h;
  const bot = obs.y;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(cx, bot, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Cone body
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.moveTo(cx, top);
  ctx.lineTo(cx - 9, bot);
  ctx.lineTo(cx + 9, bot);
  ctx.closePath(); ctx.fill();

  // White reflective stripe
  const sy = top + (bot - top) * 0.48;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(cx, sy - 4);
  ctx.lineTo(cx - 5, sy + 5);
  ctx.lineTo(cx + 5, sy + 5);
  ctx.closePath(); ctx.fill();

  // Tip highlight
  ctx.fillStyle = '#ffaa44';
  ctx.beginPath();
  ctx.arc(cx, top + 3, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Base plate
  ctx.fillStyle = '#cc4400';
  ctx.fillRect(cx - 11, bot - 5, 22, 5);
}

function drawRamp(obs) {
  const { x, y, w, h } = obs;
  const base = y;       // ground level
  const peak = y - h;   // top of ramp (right side, closest to cop car)

  // Shadow under ramp
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(x + w * 0.65, base + 5, w * 0.55, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ramp body — dark asphalt with orange tint
  const rampGrad = ctx.createLinearGradient(x, base, x + w, peak);
  rampGrad.addColorStop(0, '#443322');
  rampGrad.addColorStop(1, '#885522');
  ctx.fillStyle = rampGrad;
  ctx.beginPath();
  ctx.moveTo(x,     base);        // bottom-left (ground, far side)
  ctx.lineTo(x + w, base);        // bottom-right (ground, cop-car side)
  ctx.lineTo(x + w, peak);        // top-right = launch point
  ctx.closePath();
  ctx.fill();

  // Edge outline
  ctx.strokeStyle = '#FF9500';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, base);
  ctx.lineTo(x + w, peak);
  ctx.lineTo(x + w, base);
  ctx.stroke();

  // Diagonal warning stripes on slope face
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x, base);
  ctx.lineTo(x + w, peak);
  ctx.lineTo(x + w, base);
  ctx.closePath();
  ctx.clip();
  ctx.strokeStyle = 'rgba(255,200,0,0.30)';
  ctx.lineWidth = 7;
  for (let sx = x - h; sx < x + w + h; sx += 22) {
    ctx.beginPath();
    ctx.moveTo(sx,     base + 2);
    ctx.lineTo(sx + h, peak - 2);
    ctx.stroke();
  }
  ctx.restore();

  // Launch-edge highlight (vertical face on right)
  ctx.fillStyle = '#FF9500';
  ctx.fillRect(x + w - 3, peak, 3, base - peak);

  // Upward arrow at peak
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('↑', x + w, peak - 10);
  ctx.textAlign = 'left';
}

function drawCopCar(obs) {
  const { x, y, w, h } = obs;
  obs.lightTimer = (obs.lightTimer || 0) + 1;
  const flash = Math.floor(obs.lightTimer / 7) % 2;

  // Scale to fit collision box WIDTH, maintain aspect ratio, bottom-align to ground
  const imgSrc = copCarClean || (copCarImg.complete && copCarImg.naturalWidth > 0 ? copCarImg : null);
  let drawX = x, drawY = y, drawW = w, drawH = h;
  if (imgSrc) {
    const aspect = copCarImg.naturalWidth / copCarImg.naturalHeight;
    drawW = w;                          // fill the full collision box width
    drawH = Math.round(w / aspect);     // height from aspect ratio
    drawX = x;
    drawY = GROUND_Y - drawH + Math.round(drawH * 0.06); // slight push so wheels touch road
  }

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, GROUND_Y + 5, w / 2 + 12, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Sprite (or fallback solid block)
  if (imgSrc) {
    ctx.drawImage(imgSrc, drawX, drawY, drawW, drawH);
  } else {
    ctx.fillStyle = '#1a1a2e';
    roundRect(x, y, w, h, 4); ctx.fill();
    ctx.fillStyle = '#dde0ee';
    ctx.font = 'bold 9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('POLICE', x + w / 2, y + h * 0.6);
  }

  // Flashing light glow overlay — sits on top of sprite at the lightbar position
  const lightY = drawY + drawH * 0.08;
  const lightXL = drawX + drawW * 0.32;
  const lightXR = drawX + drawW * 0.68;

  // Red light
  ctx.fillStyle = flash === 0 ? 'rgba(255,30,30,0.95)' : 'rgba(255,50,50,0.18)';
  ctx.beginPath(); ctx.arc(lightXL, lightY, 5, 0, Math.PI * 2); ctx.fill();
  if (flash === 0) {
    ctx.fillStyle = 'rgba(255,0,0,0.20)';
    ctx.beginPath(); ctx.ellipse(lightXL, lightY, 26, 26, 0, 0, Math.PI * 2); ctx.fill();
  }

  // Blue light
  ctx.fillStyle = flash === 1 ? 'rgba(30,64,255,0.95)' : 'rgba(50,80,255,0.18)';
  ctx.beginPath(); ctx.arc(lightXR, lightY, 5, 0, Math.PI * 2); ctx.fill();
  if (flash === 1) {
    ctx.fillStyle = 'rgba(20,50,255,0.20)';
    ctx.beginPath(); ctx.ellipse(lightXR, lightY, 26, 26, 0, 0, Math.PI * 2); ctx.fill();
  }

  // Warning label above
  ctx.fillStyle = flash === 0 ? '#ff3333' : '#ff8888';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('⚠ JUMP!', x + w / 2, drawY - 8);
  ctx.textAlign = 'left';
}

function drawCollectibles() {
  collectibles.forEach(c => {
    if (c.taken) return;
    c.spin += 0.04;
    const pulse = Math.sin(c.spin * 2) * 2;

    ctx.save();
    ctx.translate(c.x, c.y + pulse);

    // Glow
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, c.r * 2.5);
    glow.addColorStop(0,   'rgba(255,215,0,0.6)');
    glow.addColorStop(1,   'rgba(255,215,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, c.r * 2.5, 0, Math.PI * 2); ctx.fill();

    // Star
    ctx.fillStyle   = '#FFD700';
    ctx.strokeStyle = '#e6ac00';
    ctx.lineWidth   = 1.5;
    drawStarPath(0, 0, 5, c.r, c.r * 0.4);
    ctx.fill(); ctx.stroke();

    ctx.restore();
  });
}

function drawStarPath(cx, cy, pts, outer, inner) {
  let angle = -Math.PI / 2;
  const step = Math.PI / pts;
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    angle += step;
  }
  ctx.closePath();
}

function drawBike() {
  const px  = player.x;
  const py  = player.y + player.jumpY;
  const ang = player.angle;

  // Ground shadow — shrinks as wheelie angle increases
  const shadowW = 58 - Math.abs(ang) * 28;
  if (shadowW > 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.ellipse(px + 8, py + 5, shadowW, 9, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  if (spriteImg.complete && spriteImg.naturalWidth > 0) {
    // Render size — preserve aspect ratio of source image
    const SW = 185;
    const SH = Math.round(SW * spriteImg.naturalHeight / spriteImg.naturalWidth);

    // Where the rear tyre contacts the ground inside the sprite image.
    // Measured as fractions: rear wheel ~20% from left edge, ~86% from top.
    const rearFX = 0.20;
    const rearFY = 0.86;

    // Pivot = rear wheel contact point on the ground
    const pivotX = px - 28;
    const pivotY = py;

    ctx.save();
    ctx.translate(pivotX, pivotY);
    ctx.rotate(ang); // negative = wheelie (front wheel lifts)
    ctx.drawImage(spriteImg, -SW * rearFX, -SH * rearFY, SW, SH);
    ctx.restore();
  }
}

function drawBikeCrash() {
  if (!spriteImg.complete || spriteImg.naturalWidth === 0) return;
  const SW    = 185;
  const SH    = Math.round(SW * spriteImg.naturalHeight / spriteImg.naturalWidth);
  const rearFX = 0.20;
  const rearFY = 0.86;

  // Tint red briefly at start of crash
  if (player.crashAlpha > 0.8) {
    ctx.save();
    ctx.filter = 'hue-rotate(340deg) saturate(4)';
  }

  ctx.save();
  ctx.globalAlpha = Math.max(0, player.crashAlpha);
  ctx.translate(player.crashX - 28, player.crashY);
  ctx.rotate(player.crashRot);
  ctx.drawImage(spriteImg, -SW * rearFX, -SH * rearFY, SW, SH);
  ctx.restore();

  if (player.crashAlpha > 0.8) ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.r * p.life), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

                   : wPct < 0.8 ? '#FFCA28'

          ctx.shadowBlur  = 12;
          ctx.fillText(`${mult}x COMBO!`, BASE_W / 2, mY + mH + 32);
          ctx.shadowBlur  = 0;
          ctx.textAlign   = 'left';
        }
      }
    }
  }
}

// ─── Click handler ────────────────────────────────────────────────────────────
function handleCanvasClick(e) {
  const rect = e._rect || canvas.getBoundingClientRect();
  const sx   = e._sx   || (BASE_W / rect.width);
  const sy   = e._sy   || (BASE_H / rect.height);
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top)  * sy;

  if (gameState === 'menu') {
    if (mx > BASE_W / 2 - 110 && mx < BASE_W / 2 + 110 && my > 348 && my < 404) {
      startGame();
    }
  } else if (gameState === 'gameover') {
    if (mx > BASE_W / 2 - 120 && mx < BASE_W / 2 + 120 && my > 310 && my < 366) {
      startGame();
    }
  }
}

// ─── Game start / reset ───────────────────────────────────────────────────────
function startGame() {
  score        = 0;
  distance     = 0;
  speed        = 5;
  gameTime        = 0;
  scrollX         = 0;
  wheelSpin       = 0;
  jumpsMade       = 0;
  hopTapped       = false;
  superHopPending = false;
  lastHopTime     = 0;
  popTapped       = false;
  popHoldFrames   = 0;
  nextHeliDist    = 2200;
  obstacles    = [];
  collectibles = [];
  particles    = [];
  nextObsDist    = 500;
  nextCoinDist   = 250;
  copCarCooldown = 0;

  Object.assign(player, {
    angle: 0, angVel: 0, wheelieTime: 0,
    jumpY: 0, jumpVel: 0, onGround: true,
    alive: true, deathTimer: 0, midAirBoosted: false, floatFrames: 0,
    crashX: 0, crashY: 0, crashVx: 0, crashVy: 0,
    crashRot: 0, crashRotVel: 0, crashAlpha: 1,
  });

  initScene();
  gameState = 'playing';
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  if (gameState !== 'playing') return;

  // ── Crash ragdoll physics (runs while gameover transition is pending) ──
  if (!player.alive) {
    player.crashVy  += 0.65;              // gravity
    player.crashY   += player.crashVy;
    player.crashX   += player.crashVx;
    player.crashRot += player.crashRotVel;
    player.crashRotVel *= 0.97;           // spin slows slightly
    // Bounce off the ground
    if (player.crashY >= GROUND_Y) {
      player.crashY   = GROUND_Y;
      player.crashVy *= -0.38;            // bounce with energy loss
      player.crashVx *= 0.72;            // friction
      player.crashRotVel *= 0.5;
      if (Math.abs(player.crashVy) < 0.8) player.crashVy = 0;
    }
    player.crashAlpha = Math.max(0, player.crashAlpha - 0.007);
    return;
  }

  gameTime++;
  speed   = 5 + Math.min(gameTime / 1800, 7);
  scrollX += speed;

  // Wheel spin
  wheelSpin -= speed * 0.07;

  // Distance & score
  distance += speed / 60;
  const wheelieMult = player.angle < -0.25
    ? 1 + Math.min(player.wheelieTime / 200, 1) * 3
    : 1;
  score += (speed / 12) * wheelieMult;

  // background scrolling is handled by scrollX in drawBackground()

  // ── Obstacle spawning (phase-aware gaps) ──
  if (copCarCooldown > 0) copCarCooldown -= speed;
  nextObsDist -= speed;
  if (nextObsDist <= 0) {
    spawnObstacle();
    const ph = getGamePhase();
    // Phase 1: wide, forgiving gaps; Phase 4: tight, fast
    const minGap  = ph === 1 ? 420 : ph === 2 ? 340 : ph === 3 ? 270 : 210;
    const randGap = ph === 1 ? 460 : ph === 2 ? 360 : ph === 3 ? 280 : 220;
    nextObsDist = minGap + Math.random() * randGap;
  }

  // ── Coin spawning ──
  nextCoinDist -= speed;
  if (nextCoinDist <= 0) {
    spawnCoin();
    nextCoinDist = 180 + Math.random() * 260;
  }

  // ── Helicopter spawning (airborne, independent of ground obstacles) ──
  nextHeliDist -= speed;
  if (nextHeliDist <= 0 && getGamePhase() >= 2) {
    spawnHelicopter();
    nextHeliDist = 1400 + Math.random() * 1800;
  }

  // ── Move obstacles & coins ──
  obstacles    = obstacles.filter(o => o.x > -(o.w || 200) - 100 && !o.passed);
  collectibles = collectibles.filter(c => c.x > -30 && !c.taken);
  obstacles.forEach(o => { o.x -= speed; });
  collectibles.forEach(c => { c.x -= speed; });

  // ── Player physics — tap-based wheelie ──
  // Tap  → angular impulse pops front wheel up.
  // Hold → spring target shifts to -0.38 (sustained wheelie equilibrium — no oscillation).
  // Release → spring target returns to 0 (wheel comes back to level).
  // Hold too long past 52 frames → loop-out crash.
  if (popTapped) {
    popTapped = false;
    player.angVel -= 0.15;  // tap impulse: lifts front wheel
  }
  if (isWheelieHeld()) {
    popHoldFrames++;
    if (popHoldFrames > 90) {
      // Loop-out: the longer you hold past the limit, the faster it tips over
      player.angVel -= (popHoldFrames - 90) * 0.0007;
    }
  } else {
    popHoldFrames = 0;
  }
  // Spring target: held = sustained wheelie; released = level
  const springTarget = isWheelieHeld() ? -0.38 : 0;
  player.angVel -= (player.angle - springTarget) * SPRING_K;
  player.angVel *= ANG_DAMP;
  player.angle  += player.angVel;
  // Clamp nose-down only; let wheelie overshoot trigger the crash check below
  player.angle   = Math.min(player.angle, 0.35);

  // Wheelie counter (angle negative = front wheel up)
  if (player.angle < -0.25) {
    player.wheelieTime++;
    if (gameTime % 2 === 0) {
      const rearScreenX = player.x - BIKE_LEN / 2 + 4;
      tireSmoke(rearScreenX, player.y + player.jumpY);
    }
  } else {
    player.wheelieTime = Math.max(0, player.wheelieTime - 2);
  }

  // ── Manual jump (HOP button) ──
  if (hopTapped) {
    hopTapped = false;
    if (player.onGround && player.jumpY === 0) {
      player.jumpVel  = JUMP_VEL;
      player.jumpY    = -1;
      player.onGround = false;
      burst(player.x, player.y, '#00b4d8', 6, 0.8);
    }
  }

  // ── Super jump (double-tap HOP) — launches extra high to clear cop cars ──
  if (superHopPending) {
    superHopPending = false;
    if (player.onGround && player.jumpY === 0) {
      // Double-tap from ground → straight super jump
      player.jumpVel       = SUPER_VEL;
      player.jumpY         = -1;
      player.onGround      = false;
      player.midAirBoosted = false;
      burst(player.x, player.y, '#FFD700', 14, 1.1);
      burst(player.x, player.y, '#FF4ECD',  8, 0.9);
    } else if (player.jumpY < -2 && !player.midAirBoosted) {
      // Mid-air boost — only ONE allowed per jump; float window starts at the peak
      player.jumpVel       = MID_AIR_VEL;
      player.midAirBoosted = true;
      player.floatFrames   = 0;
      burst(player.x, player.y + player.jumpY, '#FFD700', 14, 1.1);
      burst(player.x, player.y + player.jumpY, '#FF4ECD',  8, 0.9);
    }
    // Third tap (or more) while already boosted mid-air: silently ignored
  }

  // ── Jump physics ──
  if (player.jumpY < 0 || player.jumpVel !== 0) {
    // Float: after mid-air boost, hang at the peak for FLOAT_FRAMES frames
    const nearPeak = player.jumpVel > -2;
    const floating = player.midAirBoosted && nearPeak && player.floatFrames < FLOAT_FRAMES;
    if (floating) {
      player.floatFrames++;
      player.jumpVel += FLOAT_GRAVITY;  // barely any pull during the float window
    } else {
      player.jumpVel += GRAVITY;         // normal gravity
    }
    player.jumpY += player.jumpVel;
    if (player.jumpY >= 0) {
      player.jumpY         = 0;
      player.jumpVel       = 0;
      player.onGround      = true;
      player.midAirBoosted = false;
      player.floatFrames   = 0;
    }
  }

  // ── Crash checks ──
  if (player.angle <= CRASH_WHEELIE) { doCrash(); return; } // fell back off the bike

  // ── Collision detection ──
  const px     = player.x;
  const frontX = px + BIKE_LEN / 2;
  const rearX  = px - BIKE_LEN / 2;
  // Meaningfully in the air — jumpY is negative when airborne
  const inAir  = player.jumpY < -5;

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obs = obstacles[i];
    if (obs.passed) continue;

    const overlapping  = frontX > obs.x && rearX < obs.x + obs.w;
    const justCleared  = rearX  >= obs.x + obs.w;

    if (obs.type === 'pothole') {
      // Must be in the air to cross — wheelie alone doesn't help
      if (overlapping && !inAir) { doCrash(); return; }
      if (justCleared) {
        obs.passed = true;
        score += 30;
        jumpsMade++;
        burst(obs.x + obs.w / 2, GROUND_Y - 8, '#00e676', 6);
      }

    } else if (obs.type === 'cone') {
      // No crash — just roll through
      if (justCleared) obs.passed = true;

    } else if (obs.type === 'ramp') {
      // Auto-launch player when they hit the ramp on the ground
      if (overlapping && player.onGround && player.jumpY === 0) {
        player.jumpVel  = RAMP_VEL;
        player.jumpY    = -1;
        player.onGround = false;
        burst(player.x, player.y, '#FF9500', 8, 0.9);
      }
      if (justCleared) obs.passed = true;

    } else if (obs.type === 'copcar') {
      // Must be well airborne (>55px off ground) to clear the bigger car
      if (overlapping && player.jumpY > COPCAR_CLEAR) {
        // Hood bounce: if descending onto the roof, bounce off instead of crashing
        if (player.jumpVel > BOUNCE_MIN_VEL && player.jumpY < BOUNCE_MIN_Y) {
          obs.passed     = true;
          player.jumpVel = BOUNCE_VEL;
          player.midAirBoosted = false;
          player.floatFrames   = 0;
          score += 50;
          jumpsMade++;
          burst(player.x, player.y + player.jumpY, '#FF7A1A', 12, 1.0);
          burst(player.x, player.y + player.jumpY, '#FFD700',  8, 0.8);
        } else {
          doCrash(); return;
        }
      }
      if (justCleared) {
        obs.passed = true;
        score += 100;
        jumpsMade++;
        burst(obs.x + obs.w / 2, obs.y, '#FFD700', 14);
      }

    } else if (obs.type === 'helicopter') {
      // Collision box = fuselage body only (left 62% wide, skip top 15% rotor, 68% tall)
      const bodyX   = obs.x;
      const bodyY   = obs.drawY + obs.h * 0.15;
      const bodyR   = obs.x    + obs.w * 0.62;
      const bodyBot = bodyY    + obs.h * 0.68;
      // Player torso center (rider is ~55px above wheel contact)
      const torsoY  = player.y + player.jumpY - 55;
      const hOver   = frontX > bodyX && rearX < bodyR;
      const vOver   = torsoY > bodyY && torsoY < bodyBot;
      if (hOver && vOver) { doCrash(); return; }
      // Cleared once entire image (including tail) has passed the player
      if (rearX >= obs.x + obs.w) {
        obs.passed = true;
        score += 75;
        burst(obs.x + obs.w * 0.3, obs.drawY + obs.h * 0.5, '#FF4ECD', 10);
      }
    }
  }

  // ── Coin collection ──
  collectibles.forEach(c => {
    const dx = px - c.x;
    const dy = (player.y + player.jumpY - 30) - c.y;
    if (Math.hypot(dx, dy) < 36) {
      c.taken = true;
      score  += 50;
      burst(c.x, c.y, '#FFD700', 12);
    }
  });

  // ── Particles ──
  particles.forEach(p => {
    p.x    += p.vx;
    p.y    += p.vy;
    p.vy   += 0.12;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  // ── High score ──
  if (score > highScore) highScore = score;
}

function doCrash() {
  if (!player.alive) return;
  player.alive = false;

  const cx = player.x;
  const cy = player.y + player.jumpY;

  // Ragdoll direction: backward flip (loop-out) vs forward tumble (obstacle hit)
  const loopOut = player.angle < -0.6;
  player.crashX      = cx;
  player.crashY      = cy;
  player.crashVx     = loopOut ? -2.5 : 3.5;   // slide direction
  player.crashVy     = -7;                       // initial upward bounce
  player.crashRot    = player.angle;
  player.crashRotVel = loopOut ? -0.22 : 0.18;  // spin direction matches crash
  player.crashAlpha  = 1.0;

  burst(cx, cy, '#e94560', 22, 1.2);
  burst(cx, cy, '#fff',    10, 0.8);
  if (score > highScore) highScore = score;
  setTimeout(() => { gameState = 'gameover'; }, 1800);
}

// ─── Main loop ────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, BASE_W, BASE_H);

  drawBackground();
  drawObstacles();
  drawCollectibles();
  drawParticles();
  if (player.alive) drawBike(); else drawBikeCrash();

  if (gameState === 'playing')  drawHUD();
  if (gameState === 'menu')     drawMenu();
  if (gameState === 'gameover') drawGameOver();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
initScene();
loop();
</script>
</body>
